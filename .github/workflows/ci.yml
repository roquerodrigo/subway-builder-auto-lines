name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # Fails below the coverage thresholds in vitest.config.ts.
      - run: npm run test:coverage

      # The release workflow builds these on a tag; building them here too means a
      # packaging break surfaces on the PR rather than mid-release.
      - run: npm run package
